<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        .clock {\n            font-size: 2em;\n            margin: 10px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Digital Clock in Multiple Time Zones</h1>\n    <div id="utc" class="clock"></div>\n    <div id="est" class="clock"></div>\n    <div id="pst" class="clock"></div>\n    <script>\n        function updateClock() {\n            const now = new Date();\n            const utcTime = now.toUTCString().split(' ')[5]; // Get UTC time\n            const estOffset = -5;  // EST offset\n            const pstOffset = -8;  // PST offset\n            const utcDate = new Date(now.getTime() + now.getTimezoneOffset() * 60000);\n            const estTime = new Date(utcDate.getTime() + estOffset * 3600000);\n            const pstTime = new Date(utcDate.getTime() + pstOffset * 3600000);\n            document.getElementById('utc').innerHTML = 'Current Time (UTC): ' + utcDate.toISOString().substring(11, 19);\n            document.getElementById('est').innerHTML = 'Current Time (EST): ' + estTime.toISOString().substring(11, 19);\n            document.getElementById('pst').innerHTML = 'Current Time (PST): ' + pstTime.toISOString().substring(11, 19);\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    <\/script>\n</body>\n</html>
